name: ci

on:
  push:
    branches:
      - "master"

jobs:
  build:
    name: "Build and push"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Generate tag
        id: generate_id
        run: |
          SHA=$(echo $GITHUB_SHA | head -c7)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{secrets.DOCKERHUB_USERNAME}}/kafe-web:${{steps.generate_id.outputs.sha}},
            ${{secrets.DOCKERHUB_USERNAME}}/kafe-web:latest
